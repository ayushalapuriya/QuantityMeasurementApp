# ========================
# SERVER CONFIG
# ========================
# Default port (can be overridden)
server.port=${SERVER_PORT:8081}

# Service name (used in Eureka)
spring.application.name=auth-service


# ========================
# DATABASE CONFIG
# ========================
# These values will come from environment or local file
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

# JPA settings
# auto update tables
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
# show SQL in console
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# ========================
# EUREKA (SERVICE DISCOVERY)
# ========================
# Default Eureka server (local)
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}


# ========================
# GOOGLE OAUTH (LOGIN)
# ========================
# Will be provided in local or production environment
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=${GOOGLE_SCOPE:email,profile}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI}


# ========================
# JWT CONFIG
# ========================
# Secret key for token generation (must be strong in production)
jwt.secret=${JWT_SECRET}

spring.profiles.active=local