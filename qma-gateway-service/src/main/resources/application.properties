# ========================
# SERVER CONFIG
# ========================
server.port=${PORT:8080}
spring.application.name=gateway-service

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ========================
# EUREKA CONFIG
# ========================
eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP:false}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:${HOSTNAME:localhost}}
eureka.instance.non-secure-port=${PORT:8080}
eureka.instance.instance-id=${spring.application.name}:${eureka.instance.hostname}:${eureka.instance.non-secure-port}

# ========================
# GATEWAY ROUTES
# ========================

spring.cloud.gateway.routes[0].id=quantity-service
spring.cloud.gateway.routes[0].uri=lb://quantity-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/quantity/**

spring.cloud.gateway.routes[1].id=auth-service
spring.cloud.gateway.routes[1].uri=lb://auth-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[2].id=oauth
spring.cloud.gateway.routes[2].uri=lb://auth-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/oauth2/**,/login/oauth2/**

spring.cloud.gateway.routes[3].id=history-service
spring.cloud.gateway.routes[3].uri=lb://history-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/history/**

# ========================
# LOGGING
# ========================
logging.level.org.springframework.cloud.gateway=INFO

# ========================
# JWT CONFIG
# ========================
jwt.secret=${JWT_SECRET}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
