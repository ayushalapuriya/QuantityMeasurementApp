server.port=${PORT:8082}
spring.application.name=quantity-service

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ========================
# DB CONFIG
# ========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ========================
# EUREKA CONFIG
# ========================
eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP:false}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:${HOSTNAME:localhost}}
eureka.instance.non-secure-port=${PORT:8082}
eureka.instance.instance-id=${spring.application.name}:${eureka.instance.hostname}:${eureka.instance.non-secure-port}
